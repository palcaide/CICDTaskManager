name: CICD Workflow TaskManager 

on: 
  push

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: 21, cache: maven}
      - run: mvn compile --batch-mode
  
  test:
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: 21, cache: maven}
      - run: mvn test --batch-mode
      - if: always()
        uses: actions/upload-artifact@v4
        with: {name: test-results, path: target/surefire-reports/} 

        # pase lo que pase, genera un log y subelo a dicho path con el nombre de test-results


  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: 21, cache: maven}
      - run: mvn -B clean package
      - uses: actions/upload-artifact@v4
        with: {name: app-jar, path: target/*.jar}
        
        # sube a ese path la carpeta .jar genenerad. subelo con el nombre de name