name: ejemplo de workflow completo multijob CICD TaskManager

on: 
  push

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: 21, cache: maven}
      - run: mvn -B compile
    
  test:
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: 21, cache: maven}
      - run: mvn -B test 
      - if: always()
        uses: actions/upload-artifact@v4
        with: {name: tests-results, path: target/surefire-reports/}
  
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: 21, cache: maven}
      - run: mvn -B clean package
      - uses: actions/upload-artifact@v4
        with: {name: app-jar, path: target/*.jar}