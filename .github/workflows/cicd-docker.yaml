name: ejemplo de workflow completo multijob CICD TaskManager

on: 
  push: # Se activa al hacer push en cualquier rama

jobs:
  # =========================================================================
  # JOB 1: COMPILACIÓN
  # =========================================================================
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: 21, cache: maven}
      - run: mvn -B compile
    
  # =========================================================================
  # JOB 2: EJECUCIÓN DE TESTS
  # =========================================================================
  test:
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: 21, cache: maven}
      - run: mvn -B test 
      - if: always()
        uses: actions/upload-artifact@v4
        with: {name: tests-results, path: target/surefire-reports/}
  
  # =========================================================================
  # JOB 3: CONSTRUCCIÓN (Genera el archivo .jar)
  # =========================================================================
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: 21, cache: maven}
      - run: mvn -B clean package
      - uses: actions/upload-artifact@v4
        with: {name: app-jar, path: 'target/*.jar'} # Comillas simples para evitar fallos de sintaxis

  # =========================================================================
  # JOB 4: DOCKER PUBLISH (Construye la imagen y la sube a Docker Hub)
  # =========================================================================
  docker_publish:
    needs: build # OBLIGATORIO: Solo se ejecuta si el JAR se ha construido con éxito
    runs-on: ubuntu-latest # Corre en la nube de GitHub de forma segura
    
    steps:
      # Paso Extra Obligatorio: Descargamos el archivo .jar generado en el Job 3
      # para que el Dockerfile de la raíz pueda copiarlo dentro de la imagen.
      - name: Descargar el archivo JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/ # Lo mete en la carpeta target/ que es donde lo busca el Dockerfile

      # ── Paso 1: Checkout ────────────────────────────────────────────────
      # Copia el código fuente (incluido tu archivo 'Dockerfile') a la máquina virtual
      - name: Checkout source code
        uses: actions/checkout@v4

      # ── Paso 2: Docker Login ────────────────────────────────────────────
      # Se autentica en tu cuenta de Docker Hub usando tus Secrets privados
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # ── Paso 3: Metadata (Etiquetas inteligentes de Git) ────────────────
      # Analiza la rama o el commit para generar nombres inteligentes automáticos
      - name: Extract Docker metadata
        id: meta # Clave: ID para poder pasarle los resultados al siguiente paso
        uses: docker/metadata-action@v5
        with:
          images: pabloalcaide/examen-hospital # Nombre base de tu repositorio en Docker Hub

      # ── Paso 4: Build & Push ────────────────────────────────────────────
      # Lee el Dockerfile, inyecta el JAR, genera la imagen y la sube a internet
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: . # Indica que busque el Dockerfile en la raíz del proyecto
          push: true # Sube la imagen automáticamente a Docker Hub al terminar
          # Usa de forma dinámica las etiquetas y labels que calculó el Paso 3
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}