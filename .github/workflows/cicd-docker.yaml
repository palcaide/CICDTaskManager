name: ejemplo de workflow completo multijob CICD TaskManager

on: 
  push: # Se activa al hacer push en cualquier rama

jobs:
  # =========================================================================
  # JOB 1: COMPILACIÓN
  # =========================================================================
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: 21, cache: maven}
      - run: mvn -B compile
    
  # =========================================================================
  # JOB 2: EJECUCIÓN DE TESTS
  # =========================================================================
  test:
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: 21, cache: maven}
      - run: mvn -B test 
      - if: always()
        uses: actions/upload-artifact@v4
        with: {name: tests-results, path: target/surefire-reports/}
  
  # =========================================================================
  # JOB 3: CONSTRUCCIÓN (Genera el archivo .jar)
  # =========================================================================
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: 21, cache: maven}
      - run: mvn -B clean package
      - uses: actions/upload-artifact@v4
        with: {name: app-jar, path: 'target/*.jar'} # Comillas simples para evitar fallos de sintaxis

  # =========================================================================
  # JOB 4: DOCKER PUBLISH (Corregido)
  # =========================================================================
  docker_publish:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      # ── Paso 1: Checkout (¡SIEMPRE EL PRIMERO!) ─────────────────────────
      # Clona el repositorio y trae el Dockerfile. Deja la máquina lista.
      - name: Checkout source code
        uses: actions/checkout@v4

      # ── Paso 2: Descargar el archivo JAR (¡AHORA SÍ!) ────────────────────
      # Descargamos el ejecutable DESPUÉS del checkout para que no lo borre.
      - name: Descargar el archivo JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/ # Lo mete limpito dentro de la carpeta target/ que acaba de crear el checkout

      # ── Paso 3: Docker Login ────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # ── Paso 4: Metadata ────────────────────────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: pabloalcaide/examen-hospital

      # ── Paso 5: Build & Push ────────────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}